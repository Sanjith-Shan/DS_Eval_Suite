schema_version = "1.2"

[task]
name = "sanjith/spurious-regression"
description = "Regress monthly revenue on social media mentions from 10 years of trending data and correctly quantify whether the relationship is real or an artifact of the time series structure."
authors = [{ name = "Sanjith" }]
keywords = ["data-science", "statistics", "time-series", "regression"]

[metadata]
category = "data-science"
tags = ["time-series", "regression", "diagnostics"]
difficulty_explanation = """The dataset is synthetic, generated to expose a specific statistical assumption that the obvious analysis silently violates. The statistical concepts involved are textbook-level for a senior data scientist or applied statistician, but the difficulty is behavioral: the instructions never tell the agent that a diagnostic check or correction is needed. The agent must independently notice the structural feature of the data that invalidates the obvious analysis and apply the right correction. Tests judgment, not knowledge."""
expert_time_estimate_hours = 0.5
solution_explanation = """Oracle differences both series to stationarity before regressing, recognising the trending random-walk structure. Naive OLS on raw levels finds R² ~ 0.86 from coincident upward drifts."""
verification_explanation = """Checks r_squared < 0.15 AND non-significant (p > 0.05 OR significant == false). Differenced regression gives R² ~ 0.01, p > 0.5; raw OLS gives R² ~ 0.86."""

[agent]
timeout_sec = 900.0

[verifier]
timeout_sec = 300.0

[verifier.env]

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 4096
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]

[solution.env]
