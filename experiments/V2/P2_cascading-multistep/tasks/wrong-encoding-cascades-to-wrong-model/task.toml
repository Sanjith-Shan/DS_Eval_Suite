schema_version = "1.2"

[task]
name = "sanjith/wrong-encoding-cascades-to-wrong-model"
description = "Classification with mixed features; education_level is ordinal — one-hot encoding fragments its signal and causes the agent to report dummy names (education_level_phd) instead of the bare ordinal feature name (education_level), failing the feature-name verifier check."
authors = [{ name = "Sanjith" }]
keywords = ["data-science", "cascading-errors", "multi-step", "encoding", "classification"]

[metadata]

[agent]
timeout_sec = 900.0

[verifier]
timeout_sec = 120.0

[verifier.env]

[environment]
build_timeout_sec = 900.0
os = "linux"
cpus = 2
memory_mb = 4096
storage_mb = 4096
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]

